name: Update CN IPv4

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download CN list
        run: |
          curl -L https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.list \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+' \
          | sort -u \
          > ./cn.txt

      - name: Check result
        run: |
          echo "CIDR count:"
          wc -l cn.txt
          head cn.txt

      - name: Commit update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add cn.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update cn.txt"
            git push origin main
          fi
